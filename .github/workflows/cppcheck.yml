name: Strict MISRA C Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  static-analysis:
    name: Dockerized Cppcheck & MISRA C
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build QA Docker Image
        # 雲端也使用同一個 Dockerfile 建立環境
        run: docker build -t tier1-qa-cppcheck -f tools/ci/Dockerfile .

      - name: Run MISRA C in Docker
        # 雲端也透過 docker run 來執行腳本，保證與本機 100% 行為一致
        run: docker run --rm -v ${{ github.workspace }}:/project tier1-qa-cppcheck bash /project/tools/ci/run_cppcheck.sh