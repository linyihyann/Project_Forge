# project.yml 內容節錄
:project:
  :use_exceptions: FALSE
  :use_test_preprocessor: TRUE
  :use_auxiliary_dependencies: TRUE
  :build_root: build/test_build # 把測試編譯的垃圾檔案獨立放，不要污染 CMake 的 build

:defines:
  :test:
    - TEST
  :gcov:
    - TEST

:paths:
  :test:
    - +:test/**
  :source:
    - src/app/**
    - src/hal/**
    - src/utils/** 
    - src/srv/** 
    - src/third_party/littlefs/** 
  :include:
    - src/hal/include/**
    - src/app
    - src/utils
    - src/srv                    
    - src/third_party/littlefs 

:cmock:
  :mock_prefix: mock_
  :when_no_prototypes: :warn
  :enforce_strict_ordering: TRUE
  :plugins:
    - :ignore
    - :callback
    - :ignore_arg
    - :expect_any_args

:plugins:
  :enabled:
    - stdout_pretty_tests_report
    - module_generator
    - gcov

:gcov:
  :html_report_type: basic
  :fail_on_coverage_meet: 
    - 90 # 要求 Line (語句) 與 Branch (分支) 覆蓋率必須達到 100%，否則回傳 Error    