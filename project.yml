:project:
  :use_exceptions: FALSE
  :use_test_preprocessor: TRUE
  :use_auxiliary_dependencies: TRUE
  :build_root: build/test_build

:defines:
  :test:
    - TEST
  :gcov:
    - TEST

:paths:
  :test:
    - +:test/**
  :source:
    - src/app/**
    - src/hal/**
    - src/utils/**
    - src/srv/** - src/srv/third_party/littlefs/**
  :include:
    - src/hal/include/**
    - src/app
    - src/utils
    - src/srv                    
    - src/srv/third_party/littlefs

:cmock:
  :mock_prefix: mock_
  :when_no_prototypes: :warn
  :enforce_strict_ordering: TRUE
  :plugins:
    - :ignore
    - :callback
    - :ignore_arg
    - :expect_any_args
    - :return_thru_ptr

:plugins:
  :enabled:
    - stdout_pretty_tests_report
    - module_generator
    - gcov

:gcov:
  :html_report_type: basic
  :fail_on_coverage_meet: 
    - 90 

:flags:
  :test:
    :compile:
      :*:
        - -Wno-error=implicit-function-declaration
        - -Wno-implicit-function-declaration
  :gcov:
    :compile:
      :*:
        - -Wno-error=implicit-function-declaration
        - -Wno-implicit-function-declaration